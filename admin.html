<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ofarin — Admin</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="admin-body">

<!-- LOGIN -->
<div id="loginScreen" class="admin-login">
  <div class="login-box">
    <div class="logo" style="font-size:2rem;margin-bottom:1rem;">Ofarin</div>
    <h2>Admin Panel</h2>
    <p style="color:var(--muted);margin-bottom:2rem;font-family:var(--font-accent);font-style:italic">Enter password to continue</p>
    <div class="form-group">
      <input type="password" id="adminPass" placeholder="Password" onkeydown="if(event.key==='Enter')adminLogin()"/>
    </div>
    <button class="btn-primary full" onclick="adminLogin()">Login</button>
    <div id="loginErr" class="form-msg error" style="display:none">Wrong password.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="adminDash" style="display:none">

  <nav id="navbar" style="position:relative">
    <div class="nav-inner">
      <a href="index.html" class="logo">Ofarin</a>
      <span style="color:var(--muted);font-family:var(--font-body);font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase">Admin Dashboard</span>
      <button class="btn-outline" onclick="adminLogout()" style="padding:0.4rem 1.2rem;margin-left:auto">Logout</button>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <button class="admin-tab-btn active" onclick="showTab('bookings',this)">📋 Bookings</button>
      <button class="admin-tab-btn" onclick="showTab('contacts',this)">💬 Messages</button>
      <button class="admin-tab-btn" onclick="showTab('media',this)">🖼️ Media</button>
    </aside>

    <main class="admin-main">

      <!-- BOOKINGS TAB -->
      <div id="tab-bookings" class="admin-tab">
        <div class="admin-tab-header">
          <h2>Booking Requests</h2>
          <div style="display:flex;gap:0.75rem;align-items:center">
            <span id="bookingCount" style="font-size:0.8rem;color:var(--muted)"></span>
            <button class="btn-outline" onclick="loadBookings()" style="padding:0.4rem 1rem">↻ Refresh</button>
          </div>
        </div>

        <!-- Filter tabs -->
        <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap">
          <button class="tab-btn active" onclick="filterBookings('all',this)">All</button>
          <button class="tab-btn" onclick="filterBookings('pending',this)">⏳ Pending</button>
          <button class="tab-btn" onclick="filterBookings('confirmed',this)">✅ Confirmed</button>
          <button class="tab-btn" onclick="filterBookings('rejected',this)">❌ Rejected</button>
        </div>

        <div id="bookingsList">
          <div class="empty-msg">Loading bookings...</div>
        </div>
      </div>

      <!-- CONTACTS TAB -->
      <div id="tab-contacts" class="admin-tab" style="display:none">
        <div class="admin-tab-header">
          <h2>Contact Messages</h2>
          <button class="btn-outline" onclick="loadContacts()" style="padding:0.4rem 1rem">↻ Refresh</button>
        </div>
        <div id="contactsList"><div class="empty-msg">Loading...</div></div>
      </div>

      <!-- MEDIA TAB -->
      <div id="tab-media" class="admin-tab" style="display:none">
        <div class="admin-tab-header"><h2>Media Upload</h2></div>
        <div class="media-upload-area">
          <label class="upload-label" for="mediaInput">
            <div class="upload-icon">🌸</div>
            <p>Click to upload photos or videos</p>
            <p style="font-size:0.8rem;color:var(--muted2)">JPG, PNG, MP4, MOV supported</p>
          </label>
          <input type="file" id="mediaInput" multiple accept="image/*,video/*" onchange="handleMediaUpload(event)" style="display:none"/>
        </div>
        <div class="media-grid" id="adminMediaGrid"></div>
      </div>

    </main>
  </div>
</div>

<script src="i18n.js"></script>
<script src="main.js"></script>
<script src="admin.js"></script>
</body>
</html>
